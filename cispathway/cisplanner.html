<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIS Advisor Tool - V8.0 (Seasonal Fix)</title>
    <style>
        :root { 
            --primary: #002d62; --accent: #2c5282; --bg: #f7fafc; 
            --cis-gold: #975a16; --net-blue: #2b6cb0; --sec-red: #c53030;
            --ai-green: #276749; --cs-purple: #6b46c1; --gen-grey: #4a5568;
        }
        #gate { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 10000; color: white; font-family: system-ui; }
        .login-box { background: white; padding: 40px; border-radius: 12px; color: #2d3748; text-align: center; width: 320px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        input { padding: 12px; width: 80%; border: 2px solid #cbd5e0; border-radius: 6px; margin: 15px 0; font-size: 1rem; }
        .btn-auth { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 88%; }
        
        #app-wrapper { display: none; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #2d3748; }
        .container { max-width: 1250px; margin: 0 auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px;}
        .control-group label { display: block; font-size: 0.75rem; font-weight: 800; color: #4a5568; margin-bottom: 8px; text-transform: uppercase; }
        select.ui-select { width: 100%; padding: 10px; border-radius: 6px; border: 2px solid #cbd5e0; font-weight: 600; }
        
        .legend { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; }
        .legend-item { display: flex; align-items: center; font-size: 0.8rem; font-weight: 600; }
        .swatch { width: 16px; height: 16px; border-radius: 3px; margin-right: 8px; }

        .year-band { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px 8px 0 0; font-weight: bold; margin-top: 35px; }
        .quarter-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 2px solid #e2e8f0; border-top: none; background: #fff; }
        .quarter-card { padding: 15px; border-right: 1px solid #e2e8f0; min-height: 450px; }
        .q-title { font-weight: 800; color: var(--accent); border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem; }
        
        .class-row { margin-bottom: 12px; }
        .advisor-pick { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e0; font-size: 0.85rem; border-left: 6px solid #cbd5e0; font-weight: 600; background: #fff; }
        .advisor-pick[data-cat="net"] { border-left-color: var(--net-blue); }
        .advisor-pick[data-cat="sec"] { border-left-color: var(--sec-red); }
        .advisor-pick[data-cat="ai"] { border-left-color: var(--ai-green); }
        .advisor-pick[data-cat="cis"] { border-left-color: var(--cis-gold); }
        .advisor-pick[data-cat="cs"] { border-left-color: var(--cs-purple); }

        .validation-msg { display: block; font-size: 0.65rem; font-weight: 800; margin-top: 2px; min-height: 14px; }
        .error { color: #c53030; }
        .q-total { margin-top: 15px; padding-top: 10px; border-top: 2px dashed #e2e8f0; text-align: right; font-weight: 800; color: #4a5568; }
        
        @media print { .controls, #gate, .legend { display: none !important; } #app-wrapper { display: block !important; } }
    </style>
</head>
<body>

<div id="gate">
    <div class="login-box">
        <h2 style="margin:0;">Faculty Staging</h2>
        <input type="password" id="p-word" placeholder="Password" onkeydown="if(event.key==='Enter') checkAuth()">
        <button class="btn-auth" onclick="checkAuth()">Access Tool</button>
        <p id="err" style="color:red; font-size: 0.8rem; display:none; margin-top: 10px;">Incorrect Password</p>
    </div>
</div>

<div id="app-wrapper">
    <div class="container">
        <div class="header-bar">
            <h1 style="margin:0; font-size: 1.4rem;">CIS Academic Pathways <span style="font-weight:400; color:#718096;">(v8.0 Optimized)</span></h1>
            <button onclick="window.print()" style="padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; background: var(--primary); color: white; border: none;">Print to PDF</button>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Program Focus</label>
                <select id="path" class="ui-select" onchange="init()">
                    <option value="CIS-Net">CIS AAS (Networking)</option>
                    <option value="CIS-AI">CIS AAS (AI Focus)</option>
                    <option value="Cyber">Cybersecurity AAS-T</option>
                </select>
            </div>
            <div class="control-group">
                <label>Start Term</label>
                <select id="start" class="ui-select" onchange="init()">
                    <option value="Fall">Fall</option>
                    <option value="Winter">Winter</option>
                    <option value="Spring">Spring</option>
                </select>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="swatch" style="background:var(--cis-gold);"></div> CIS Core</div>
            <div class="legend-item"><div class="swatch" style="background:var(--net-blue);"></div> Networking</div>
            <div class="legend-item"><div class="swatch" style="background:var(--sec-red);"></div> Security</div>
            <div class="legend-item"><div class="swatch" style="background:var(--ai-green);"></div> AI Series</div>
            <div class="legend-item"><div class="swatch" style="background:var(--cs-purple);"></div> CS / Java</div>
            <div class="legend-item"><div class="swatch" style="background:var(--gen-grey);"></div> Gen Ed</div>
        </div>

        <div id="mount"></div>
    </div>
</div>

<script>
    const P_ACCESS = "Cyber2026";
    const DB_CR = { "CIS 105": 4, "CIS 106": 5, "CIS 110": 3, "CIS 116": 3, "CIS 205": 5, "CIS 206": 4, "CIS 214": 5, "CIS 215": 5, "CIS 216": 5, "CIS 225": 5, "CIS 236": 5, "CIS 220": 5, "CIS 237": 6, "CIS 238": 6, "CIS 120": 5, "CIS 125": 5, "CIS 245": 5, "CIS 190": 5, "ENGL& 101": 5, "MATH& 141": 5, "MATH& 142": 5, "MATH& 151": 5, "CS& 141": 5, "CS 145": 5, "Gen Ed": 5, "Elective": 5, "None": 0 };
    const DB_SEASON = { "CIS 206": "Winter", "CIS 225": "Spring", "CIS 220": "Spring", "CIS 245": "Spring", "CIS 120": "Fall", "CIS 125": "Winter", "CIS 214": "Fall/Winter", "CIS 237": "Fall/Winter", "CIS 238": "Winter/Spring" };
    const DB_PRE = { "CIS 237": ["CIS 236"], "CIS 238": ["CIS 237"], "CIS 215": ["CIS 214"], "CIS 216": ["CIS 215"], "CIS 125": ["CIS 120"], "CIS 245": ["CIS 125"], "CS 145": ["CS& 141"], "MATH& 142": ["MATH& 141"], "MATH& 151": ["MATH& 142"] };
    const DB_CAT = { "CIS 236": "net", "CIS 237": "net", "CIS 238": "net", "CIS 214": "sec", "CIS 215": "sec", "CIS 216": "sec", "CIS 225": "sec", "CIS 120": "ai", "CIS 125": "ai", "CIS 245": "ai", "CIS 105": "cis", "CIS 106": "cis", "CIS 110": "cis", "CIS 116": "cis", "CS& 141": "cs", "CS 145": "cs" };
    
    const TRACKS = {
        "Cyber": ["CIS 105", "CIS 106", "CIS 110", "CIS 116", "CIS 205", "CIS 236", "CIS 237", "CIS 238", "CIS 214", "CIS 215", "CIS 216", "CS& 141", "CS 145", "ENGL& 101", "MATH& 141", "MATH& 142", "MATH& 151"],
        "CIS-Net": ["CIS 105", "CIS 106", "CIS 110", "CIS 116", "CIS 205", "CIS 206", "CIS 236", "CIS 237", "CIS 238", "CIS 214", "CIS 215", "CIS 216", "CIS 225", "CIS 220", "ENGL& 101", "Gen Ed", "Elective", "CIS 190"],
        "CIS-AI": ["CIS 105", "CIS 106", "CIS 110", "CIS 116", "CIS 205", "CIS 206", "CIS 120", "CIS 125", "CIS 245", "CIS 214", "CIS 215", "CIS 216", "CIS 225", "CIS 220", "ENGL& 101", "Gen Ed", "Elective", "CIS 190"]
    };

    function checkAuth() {
        if(document.getElementById('p-word').value === P_ACCESS) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('app-wrapper').style.display = 'block';
            init();
        } else { document.getElementById('err').style.display = 'block'; }
    }

    function init() {
        const path = document.getElementById('path').value, start = document.getElementById('start').value, mount = document.getElementById('mount');
        mount.innerHTML = "";
        const terms = ["Fall", "Winter", "Spring"], opts = Object.keys(DB_CR).sort().map(c => `<option value="${c}">${c}</option>`).join('');
        let pool = [...TRACKS[path]], completed = [], curYr = 0;

        for (let i = 0; i < 6; i++) {
            if (i % 3 === 0) {
                curYr++;
                mount.innerHTML += `<div class="year-band">ACADEMIC YEAR ${curYr}</div><div class="quarter-grid"></div>`;
            }
            let grids = mount.querySelectorAll('.quarter-grid'), grid = grids[grids.length-1], sea = terms[(terms.indexOf(start) + i) % 3];
            let qClasses = [], qCr = 0, qMax = (i === 0) ? 15 : 18;

            for (let j = 0; j < pool.length; j++) {
                let code = pool[j];
                let pOk = !DB_PRE[code] || DB_PRE[code].every(p => completed.includes(p));
                let sOk = !DB_SEASON[code] || DB_SEASON[code].split('/').includes(sea);
                
                if (code === "CIS 106" && qClasses.includes("CIS 105")) pOk = true;

                if (pOk && sOk && (qCr + DB_CR[code] <= qMax) && qClasses.length < 5) {
                    qClasses.push(code); qCr += DB_CR[code]; pool.splice(j, 1); j--;
                }
            }
            completed.push(...qClasses);
            let card = document.createElement('div'); card.className = 'quarter-card';
            card.innerHTML = `<div class="q-title">${sea} Quarter</div>`;
            for (let r = 0; r < 5; r++) {
                let row = document.createElement('div'); row.className = 'class-row';
                row.innerHTML = `<select class="advisor-pick" onchange="audit()">${opts}</select><span class="validation-msg"></span>`;
                row.querySelector('select').dataset.init = qClasses[r] || "None";
                card.appendChild(row);
            }
            card.innerHTML += `<div class="q-total">0 Credits</div>`;
            grid.appendChild(card);
        }
        document.querySelectorAll('.advisor-pick').forEach(s => s.value = s.dataset.init);
        audit();
    }

    function audit() {
        let history = []; const quarters = document.querySelectorAll('.quarter-card'), terms = Array.from(document.querySelectorAll('.q-title')).map(t => t.textContent.split(' ')[0]);
        quarters.forEach((card, qIdx) => {
            let cr = 0; const selects = card.querySelectorAll('.advisor-pick'), msgs = card.querySelectorAll('.validation-msg');
            const qClasses = Array.from(selects).map(s => s.value);
            selects.forEach((sel, sIdx) => {
                const v = sel.value, msg = msgs[sIdx]; sel.dataset.cat = DB_CAT[v] || 'gen'; msg.textContent = "";
                if (v !== "None") {
                    cr += DB_CR[v];
                    if (DB_PRE[v] && !DB_PRE[v].every(p => history.includes(p)) && !(v === "CIS 106" && qClasses.includes("CIS 105"))) {
                        msg.textContent = "❌ Prereq Missing (Prior Quarter)"; msg.className = "validation-msg error";
                    }
                    if (DB_SEASON[v] && !DB_SEASON[v].split('/').includes(terms[qIdx])) {
                        msg.textContent = `⚠️ Offered: ${DB_SEASON[v]}`; msg.className = "validation-msg error";
                    }
                }
            });
            card.querySelector('.q-total').textContent = `${cr} Credits`;
            selects.forEach(s => { if(s.value !== "None") history.push(s.value); });
        });
    }
</script>
</body>
</html>

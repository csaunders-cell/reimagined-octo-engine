<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation: Midnight Pizza - Cyber Challenge</title>
    <style>
        :root {
            --burgundy: #800000;
            --blue: #003366;
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-gray);
            color: #333;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background-color: var(--white);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-top: 10px solid var(--burgundy);
            border-bottom: 10px solid var(--blue);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        h1 {
            color: var(--burgundy);
            text-align: center;
            margin-top: 0;
        }

        .disclaimer {
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
            background: #fff;
        }

        #scenario-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--blue);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid var(--blue);
            background-color: var(--white);
            color: var(--blue);
            border-radius: 5px;
            transition: all 0.2s ease;
            text-align: left;
        }

        button:hover, button:focus {
            background-color: var(--blue);
            color: var(--white);
            outline: 3px solid var(--burgundy);
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }

        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        #score-board {
            text-align: right;
            font-weight: bold;
            color: var(--burgundy);
            margin-bottom: 10px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container" role="main">
    <h1>🍕 Operation: Midnight Pizza</h1>
    
    <div class="disclaimer">
        <strong>Disclaimer:</strong> This is a game for educational purposes. No actual pizza was harmed in the making of this simulation.
    </div>

    <div id="score-board">Security Points: <span id="score">0</span></div>

    <div id="game-content">
        <p id="scenario-text"></p>
        <div class="btn-container" id="choices"></div>
        <div id="feedback"></div>
        <button id="next-btn" class="hidden" style="margin-top:20px; width: 100%; text-align: center; background: var(--burgundy); color: white;">Next Challenge &rarr;</button>
    </div>

    <div id="final-screen" class="hidden">
        <h2 id="final-rank"></h2>
        <p id="final-message"></p>
        <button onclick="location.reload()" style="width: 100%; text-align: center;">Try Again</button>
    </div>
</div>

<script>
    const scenarios = [
        {
            text: "Scenario 1: You find a USB drive shaped like a pizza slice in the quad labeled 'TOP SECRET EXAM ANSWERS'. What do you do?",
            options: [
                { text: "Plug it in! Grades > Safety.", score: -10, feedback: "🚨 OH NO! You've been 'Baited'. A Rubber Ducky script just sent your browser history to the entire faculty." },
                { text: "Hand it to your instructor.", score: 10, feedback: "✅ Smart! This is a common social engineering tactic. You kept the network safe." },
                { text: "Leave it there and walk away.", score: 10, feedback: "✅ Safe choice. If you didn't buy it, don't plug it in!" }
            ]
        },
        {
            text: "Scenario 2: A DM from 'Admin_Official' says they need your password to speed up your Wi-Fi for gaming. You have 2 minutes to reply!",
            options: [
                { text: "Send it immediately!", score: -20, feedback: "🚨 Oops! That was Phishing. Your account is now being used to spam your classmates." },
                { text: "Block and report them.", score: 20, feedback: "✅ Correct. Real admins will never ask for your password via DM." },
                { text: "Send them a fake password like 'NotTodayScammer'.", score: 5, feedback: "⚠️ Funny, but dangerous. Engaging tells the hacker your account is active!" }
            ]
        },
        {
            text: "Scenario 3: You're at the coffee shop. Do you connect to 'FREE_WIFI_NO_SCAM_PROMISE'?",
            options: [
                { text: "Yes, it says no scam!", score: -20, feedback: "🚨 Yikes! That was an 'Evil Twin' hotspot. A hacker just saw you log into your email." },
                { text: "No, I'll use my phone's hotspot.", score: 20, feedback: "✅ Expert move! Personal hotspots or VPNs are the way to go on public ground." }
            ]
        }
    ];

    let currentLevel = 0;
    let totalScore = 0;

    const scenarioText = document.getElementById('scenario-text');
    const choicesContainer = document.getElementById('choices');
    const feedbackDiv = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const scoreDisplay = document.getElementById('score');

    function loadScenario() {
        const s = scenarios[currentLevel];
        scenarioText.innerText = s.text;
        choicesContainer.innerHTML = '';
        feedbackDiv.style.display = 'none';
        nextBtn.classList.add('hidden');

        s.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.text;
            btn.onclick = () => handleChoice(opt);
            choicesContainer.appendChild(btn);
        });
    }

    function handleChoice(opt) {
        totalScore += opt.score;
        scoreDisplay.innerText = totalScore;
        
        feedbackDiv.innerText = opt.feedback;
        feedbackDiv.style.display = 'block';
        feedbackDiv.className = opt.score > 0 ? 'success' : 'danger';
        
        choicesContainer.querySelectorAll('button').forEach(b => b.disabled = true);
        nextBtn.classList.remove('hidden');
    }

    nextBtn.onclick = () => {
        currentLevel++;
        if (currentLevel < scenarios.length) {
            loadScenario();
        } else {
            showFinalScreen();
        }
    };

    function showFinalScreen() {
        document.getElementById('game-content').classList.add('hidden');
        const finalScreen = document.getElementById('final-screen');
        finalScreen.classList.remove('hidden');
        
        let rank = "";
        let msg = "";

        if (totalScore >= 40) {
            rank = "🏆 Rank: Cyber Sentinel";
            msg = "You're a natural! Have you considered a career in digital defense?";
        } else if (totalScore > 0) {
            rank = "🛡️ Rank: Digital Citizen";
            msg = "Not bad, but keep an eye out for those sneaky pizza-shaped traps.";
        } else {
            rank = "📉 Rank: Click-Happy Intern";
            msg = "We might need to start with the basics... like how to not click everything.";
        }

        document.getElementById('final-rank').innerText = rank;
        document.getElementById('final-message').innerText = msg + " Total Score: " + totalScore;
    }

    loadScenario();
</script>

</body>
</html>

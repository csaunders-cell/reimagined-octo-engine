<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Industrial Networks</title>
    <style>
        /* Base styles maintained, enhanced focus indicators */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1e3c72; color: #333; }
        
        .slide { 
            display: none; width: 90%; max-width: 1200px; height: 85vh; 
            background: #fff; border-radius: 20px; padding: 60px; margin: 5vh auto;
            overflow-y: auto; outline: none;
        }
        .slide.active { display: block; }
        
        /* Ensure buttons have high contrast focus states */
        button:focus { outline: 4px solid #ffbf47; outline-offset: 2px; }
        
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); }
    </style>
</head>
<body>

    <div id="announcer" class="sr-only" aria-live="polite"></div>

    <main class="slide-container" id="main-content">
        <article class="slide active" id="slide-1" tabindex="-1" aria-labelledby="h1-1">
            <h1 id="h1-1">Introduction to Industrial Networks</h1>
            <p>Use the buttons at the bottom to navigate.</p>
        </article>
        
        </main>

    <div class="navigation" role="navigation" aria-label="Slide Navigation">
        <button id="prevBtn" onclick="changeSlide(-1)">Previous</button>
        <button id="nextBtn" onclick="changeSlide(1)">Next</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (n + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
            
            // Move focus to the top of the new slide for accessibility
            slides[currentSlide].focus();
            
            // Announce slide number to screen readers
            document.getElementById('announcer').textContent = `Slide ${currentSlide + 1} of ${slides.length}`;
            
            // Update button states
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
        }

        function changeSlide(direction) {
            showSlide(currentSlide + direction);
        }
    </script>
</body>
</html>
